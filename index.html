<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEBULA ODYSSEY | Premium Space Experience</title>
    <meta name="description"
        content="Um jogo de tiro espacial épico com gráficos premium e jogabilidade fluida. Destrua os inimigos e sobreviva à Nebulosa!">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <!-- HUD -->
            <div id="hud" class="glass">
                <div class="stat-item">
                    <span class="stat-label">PONTUAÇÃO</span>
                    <span id="score" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">ESTRUTURA</span>
                    <div id="hp-container">
                        <div id="hp-bar"></div>
                    </div>
                </div>
            </div>

            <!-- START MENU -->
            <div id="start-menu" class="menu-screen active">
                <div class="menu-content glass">
                    <h1>NEBULA ODYSSEY</h1>
                    <p class="subtitle">A armada inimiga se aproxima. Defenda o setor.</p>
                    <button id="start-btn" class="primary-btn">INICIAR MISSÃO</button>
                    <div class="controls-hint" style="margin-top: 2rem; opacity: 0.5; font-size: 0.8rem;">
                        MOUSE / TOUCH PARA MOVER • CLIQUE PARA ATIRAR
                    </div>
                </div>
            </div>

            <!-- GAME OVER -->
            <div id="game-over-menu" class="menu-screen">
                <div class="menu-content glass">
                    <h1
                        style="background: linear-gradient(135deg, #fff 0%, #ef4444 100%); -webkit-background-clip: text; background-clip: text;">
                        MISSÃO FALHOU</h1>
                    <p class="subtitle">Sua nave foi destruída em combate.</p>
                    <div style="margin-bottom: 2rem;">
                        <span style="opacity: 0.5; font-size: 0.9rem;">SCORE FINAL</span><br>
                        <span id="final-score-val" style="font-size: 2.5rem; font-weight: 700; color: #fcd34d;">0</span>
                    </div>
                    <button id="restart-btn" class="primary-btn">TENTAR NOVAMENTE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
